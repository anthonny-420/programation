<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOKEPON!</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <section id="pet-selection">
    <h1 id="title">Mokepon</h1>
    <h2 class="subtitle">Which one will be your pet?</h2>

    <div id="cards-container" class="cards">
      <!--PETS-->
    </div>

    <button id="pet-button">Selection</button>
  </section>

  <section id="attack-selection">
    <h1 id="title">Mokepon</h1>
    <h2 class="subtitle">Now, you must choose one attack:</h2>

    <div class="attack-cards">
      <button id="fire-button" class="attack-buttons">fire 🔥</button>
      <button id="water-button" class="attack-buttons">water 💧</button>
      <button id="land-button" class="attack-buttons">land 🪴</button>
    </div>


    <div id="messages">
      <p id="result">¡I know that you can do it!</p>


      <section id="reboot">
        <button id="reboot-button">reboot</button>
      </section>

    </div>



    <div class="attacks">

      <div class="player-column">
        <p id="player-lives">3</p>
        <p id="pet-player"></p>
        <div id="player-attacks"></div>
      </div>

      <div class="enemy-column">
        <p id="enemy-lives">3</p>
        <p id="pet-enemy"></p>
        <div id="enemy-attacks"></div>
      </div>

    </div>

  </section>

  <script src="./js/mokepon.js"></script>
</body>

</html>
